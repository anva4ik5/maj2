name: Build GameCheat

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Add MSVC to PATH
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Configure CMake
      env:
        EMBEDDED_API_URL: ${{ secrets.EMBEDDED_API_URL }}
        EMBEDDED_SHARED_KEY: ${{ secrets.EMBEDDED_SHARED_KEY }}
        EMBEDDED_BOT_USERNAME: ${{ secrets.EMBEDDED_BOT_USERNAME }}
      run: |
        $url = if ($env:EMBEDDED_API_URL) { $env:EMBEDDED_API_URL } else { "https://majcheat-production.up.railway.app" }
        $key = if ($env:EMBEDDED_SHARED_KEY) { $env:EMBEDDED_SHARED_KEY } else { "" }
        $bot = if ($env:EMBEDDED_BOT_USERNAME) { $env:EMBEDDED_BOT_USERNAME } else { "" }
        cmake -B build -S . -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release `
          "-DEMBEDDED_API_URL=$url" `
          "-DEMBEDDED_SHARED_KEY=$key" `
          "-DEMBEDDED_BOT_USERNAME=$bot"

    - name: Build Release
      run: |
        cmake --build build --config Release --verbose

    - name: List output files
      run: |
        Get-ChildItem -Path build\bin -Recurse -ErrorAction SilentlyContinue
        Get-ChildItem -Path build\Release -Recurse -ErrorAction SilentlyContinue

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: GameCheat-EXE
        path: |
          build/bin/GameCheat_Restored.exe
          build/bin/Release/GameCheat_Restored.exe
          build/Release/GameCheat_Restored.exe
          config.ini
        if-no-files-found: error
