name: Build GameCheat

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Add MSVC to PATH
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Configure CMake
      run: |
        cmake -B build -S . -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release

    - name: Build Release
      run: |
        cmake --build build --config Release --verbose

    - name: List output files
      run: |
        Get-ChildItem -Path build\bin -Recurse -ErrorAction SilentlyContinue
        Get-ChildItem -Path build\Release -Recurse -ErrorAction SilentlyContinue

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: GameCheat-EXE
        path: |
          build/bin/Release/GameCheat_Restored.exe
          build/Release/GameCheat_Restored.exe
        if-no-files-found: warn
