[Server]
# These values are embedded into exe at build time via GitHub secrets.
# Leave empty to use the embedded defaults. Override only for local testing.
host=127.0.0.1
port=8080
url=
shared_key=
telegram_bot_token=
admin_telegram_id=

[Overlay]
enabled=true
color=FFFFFFFF

[General]
# 'auto' = try altv.exe, GTA5.exe, rust.exe (in order)
# Or specify a single process or comma-separated list (e.g. altv.exe,GTA5.exe)
target_process=auto
log_level=info
auto_start=false
# game_mode: majestic_rp | altv | gta5 | rust
game_mode=auto

[Aimbot]
